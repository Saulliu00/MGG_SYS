{% extends "base.html" %}

{% block title %}仿真计算 - MGG仿真系统{% endblock %}

{% block content %}
<div class="main-container">
    <div class="simulation-container">
        <!-- Left Panel - Test Parameters (测试参数) -->
        <div class="panel parameters-panel">
            <div class="panel-title">测试参数</div>

            <form id="simulationForm">
                <div class="form-group">
                    <label>点火具型号:</label>
                    <select name="ignition_model" class="form-control custom-select" onchange="handleCustomOption(this)">
                        <option value="60">60</option>
                        <option value="85">85</option>
                        <option value="115">115</option>
                        <option value="135">135</option>
                        <option value="235">235</option>
                        <option value="__custom__">自定义...</option>
                    </select>
                    <input type="text" class="form-control custom-input" style="display:none; margin-top:0.3rem;" placeholder="输入自定义值">
                </div>

                <div class="form-group">
                    <label>NC类型1:</label>
                    <select name="nc_type_1" class="form-control custom-select" onchange="handleCustomOption(this)">
                        <option value="A">A</option>
                        <option value="B">B</option>
                        <option value="C">C</option>
                        <option value="E">E</option>
                        <option value="F">F</option>
                        <option value="G">G</option>
                        <option value="M">M</option>
                        <option value="__custom__">自定义...</option>
                    </select>
                    <input type="text" class="form-control custom-input" style="display:none; margin-top:0.3rem;" placeholder="输入自定义值">
                </div>

                <div class="form-group">
                    <label>NC用量1 (毫克):</label>
                    <input type="number" name="nc_usage_1" class="form-control" value="0" step="0.1">
                </div>

                <div class="form-group">
                    <label>NC类型2:</label>
                    <select name="nc_type_2" class="form-control custom-select" onchange="handleCustomOption(this)">
                        <option value="无">无</option>
                        <option value="A">A</option>
                        <option value="B">B</option>
                        <option value="C">C</option>
                        <option value="E">E</option>
                        <option value="F">F</option>
                        <option value="G">G</option>
                        <option value="M">M</option>
                        <option value="__custom__">自定义...</option>
                    </select>
                    <input type="text" class="form-control custom-input" style="display:none; margin-top:0.3rem;" placeholder="输入自定义值">
                </div>

                <div class="form-group">
                    <label>NC用量2 (毫克):</label>
                    <input type="number" name="nc_usage_2" class="form-control" value="0" step="0.1">
                </div>

                <div class="form-group">
                    <label>GP类型:</label>
                    <select name="gp_type" class="form-control custom-select" onchange="handleCustomOption(this)">
                        <option value="D">D</option>
                        <option value="GP-3">GP-3</option>
                        <option value="J">J</option>
                        <option value="K">K</option>
                        <option value="L">L</option>
                        <option value="GG">GG</option>
                        <option value="__custom__">自定义...</option>
                    </select>
                    <input type="text" class="form-control custom-input" style="display:none; margin-top:0.3rem;" placeholder="输入自定义值">
                </div>

                <div class="form-group">
                    <label>GP用量 (毫克):</label>
                    <input type="number" name="gp_usage" class="form-control" value="0" step="0.1">
                </div>

                <div class="form-group">
                    <label>管壳高度 (mm):</label>
                    <select name="shell_model" class="form-control custom-select" onchange="handleCustomOption(this)">
                        <option value="17.8">17.8</option>
                        <option value="18">18</option>
                        <option value="18.3">18.3</option>
                        <option value="22">22</option>
                        <option value="24">24</option>
                        <option value="31.4">31.4</option>
                        <option value="34">34</option>
                        <option value="__custom__">自定义...</option>
                    </select>
                    <input type="text" class="form-control custom-input" style="display:none; margin-top:0.3rem;" placeholder="输入自定义值">
                </div>

                <div class="form-group">
                    <label>通电条件 (A):</label>
                    <select name="current" class="form-control custom-select" onchange="handleCustomOption(this)">
                        <option value="1.2">1.2</option>
                        <option value="1.75">1.75</option>
                        <option value="__custom__">自定义...</option>
                    </select>
                    <input type="text" class="form-control custom-input" style="display:none; margin-top:0.3rem;" placeholder="输入自定义值">
                </div>

                <div class="form-group">
                    <label>传感器量程 (/MPa):</label>
                    <select name="sensor_model" class="form-control custom-select" onchange="handleCustomOption(this)">
                        <option value="30">30</option>
                        <option value="60">60</option>
                        <option value="100">100</option>
                        <option value="200">200</option>
                        <option value="300">300</option>
                        <option value="__custom__">自定义...</option>
                    </select>
                    <input type="text" class="form-control custom-input" style="display:none; margin-top:0.3rem;" placeholder="输入自定义值">
                </div>

                <div class="form-group">
                    <label>容积 (mL):</label>
                    <select name="body_model" class="form-control custom-select" onchange="handleCustomOption(this)">
                        <option value="3.5">3.5</option>
                        <option value="6">6</option>
                        <option value="8-1082">8-1082</option>
                        <option value="10-892">10-892</option>
                        <option value="10-1027">10-1027</option>
                        <option value="10-6008">10-6008</option>
                        <option value="10-6044">10-6044</option>
                        <option value="11.5-6056">11.5-6056</option>
                        <option value="27">27</option>
                        <option value="__custom__">自定义...</option>
                    </select>
                    <input type="text" class="form-control custom-input" style="display:none; margin-top:0.3rem;" placeholder="输入自定义值">
                </div>

            </form>
        </div>

        <!-- Middle Panel - Test Standards and Personnel (测试标准与人员) -->
        <div class="panel test-info-panel">
            <div class="panel-title">测试标准与人员</div>

            <div class="form-group">
                <label>工号 (选填):</label>
                <input type="text" name="employee_id" form="simulationForm" class="form-control" placeholder="输入工号">
            </div>

            <div class="form-group">
                <label>测试名称 (选填):</label>
                <input type="text" name="test_name" form="simulationForm" class="form-control" placeholder="输入测试名称">
            </div>

            <div class="form-group">
                <label>备注 (选填):</label>
                <textarea name="notes" form="simulationForm" class="form-control" placeholder="输入备注信息"></textarea>
            </div>

            <div class="form-group">
                <label>测试设备 (选填):</label>
                <select name="equipment" form="simulationForm" class="form-control custom-select" onchange="handleCustomOption(this)">
                    <option value="Y-M">Y-M</option>
                    <option value="Y-H">Y-H</option>
                    <option value="J-H1_1">J-H1_1</option>
                    <option value="J-H2_2">J-H2_2</option>
                    <option value="__custom__">自定义...</option>
                </select>
                <input type="text" class="form-control custom-input" style="display:none; margin-top:0.3rem;" placeholder="输入自定义值">
            </div>

            <div class="form-group" style="margin-top: 1rem;">
                <button type="button" class="btn btn-primary" onclick="generateWorkOrder()">
                    <i class="fas fa-file-alt"></i> 生成工单
                </button>
                <input type="hidden" name="work_order" id="workOrderInput" form="simulationForm" value="">
                <div id="workOrderNumber" style="margin-top: 0.5rem; font-weight: bold; color: #667eea;"></div>
            </div>

        </div>

        <!-- Right Panel - Results (操作与结果) -->
        <div class="panel results-panel">
            <div class="panel-title">操作与结果</div>

            <!-- Tab Buttons -->
            <div class="tab-buttons">
                <button type="button" class="tab-btn active" onclick="switchTab('simulation'); runSimulation()">
                    <i class="fas fa-calculator"></i> 仿真
                </button>
                <button type="button" class="tab-btn" onclick="switchTab('actual')">
                    <i class="fas fa-database"></i> 实际数据存储
                </button>
                <button type="button" class="tab-btn" onclick="switchTab('comparison')">
                    <i class="fas fa-chart-line"></i> PT曲线对比
                </button>
            </div>

            <!-- Tab Contents -->
            <!-- Simulation Tab -->
            <div id="simulation" class="tab-content active">
                <div class="chart-container">
                    <div class="chart-header">计算结果</div>
                    <div class="chart-info">
                        多项式拟合 (Degree=3, 中标R²=1.0000)<br>
                        拟真值: 775.0
                    </div>
                    <div id="chartDiv"></div>
                </div>
            </div>

            <!-- Actual Data Storage Tab -->
            <div id="actual" class="tab-content">
                <div class="upload-section">
                    <!-- Work Order Input -->
                    <div style="margin-bottom: 1rem; padding: 0.75rem; background: #f8f9fa; border-radius: 8px;">
                        <label style="display: block; margin-bottom: 0.5rem; font-weight: 600; color: #2c3e50; font-size: 0.9rem;">
                            <i class="fas fa-file-alt" style="color: #667eea;"></i> 关联工单号 (选填):
                        </label>
                        <input type="text" id="uploadWorkOrderInput" class="form-control" 
                               placeholder="输入工单号以关联数据（留空则使用当前仿真结果）"
                               style="font-size: 0.88rem;">
                        <div style="font-size: 0.78rem; color: #7f8c8d; margin-top: 0.3rem;">
                            💡 如果上传的是历史工单的实验数据，请填写工单号；如果是当前仿真的实验数据，留空即可
                        </div>
                    </div>
                    
                    <input type="file" id="testFileInput" accept=".xlsx,.xls" style="display: none;">
                    <label class="upload-label" id="uploadLabel" onclick="triggerFileInput()">
                        <i class="fas fa-cloud-upload-alt fa-3x"></i>
                        <p>点击上传测试数据文件 (.xlsx)</p>
                        <p style="font-size: 0.9rem; color: #7f8c8d;">文件应包含时间和压力两列数据</p>
                    </label>

                    <!-- Shown after file is validated, hidden by default -->
                    <div id="uploadPreviewArea" style="display:none; margin-top:1rem;">
                        <div id="uploadPreviewInfo" style="background:#f0f9f4; border:1px solid #27ae60;
                             border-radius:8px; padding:0.9rem; font-size:0.88rem; color:#2c3e50;
                             margin-bottom:0.75rem; line-height:1.8;"></div>
                        <div id="uploadValidationErrors" style="background:#fdf2f2; border:1px solid #e74c3c;
                             border-radius:8px; padding:0.9rem; font-size:0.88rem; color:#c0392b;
                             margin-bottom:0.75rem; display:none;"></div>
                        <div style="display:flex; gap:0.75rem; justify-content:center; margin-top:0.5rem;">
                            <button type="button" onclick="cancelUpload()"
                                    style="background:#ecf0f1; color:#2c3e50; border:none;
                                           padding:0.55rem 1.4rem; border-radius:8px; cursor:pointer;
                                           font-size:0.9rem; font-weight:bold;">
                                <i class="fas fa-times"></i> 取消上传
                            </button>
                            <button type="button" id="confirmUploadBtn" onclick="confirmUpload()"
                                    style="background:#667eea; color:white; border:none;
                                           padding:0.55rem 1.4rem; border-radius:8px; cursor:pointer;
                                           font-size:0.9rem; font-weight:bold;">
                                <i class="fas fa-check"></i> 确认上传
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- PT Curve Comparison Tab -->
            <div id="comparison" class="tab-content">
                <div class="chart-container">
                    <div class="chart-header">PT曲线对比</div>
                    <div class="chart-info">
                        蓝线: 仿真数据 | 红线: 实际测试数据
                    </div>
                    <div id="comparisonChart"></div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script src="{{ url_for('static', filename='js/simulation.js') }}"></script>
{% endblock %}
